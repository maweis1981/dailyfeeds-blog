# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# Site language: zh-CN 同时影响布局语言；文章本身可以中英混排。
lang: zh-CN

timezone: Asia/Singapore

# jekyll-seo-tag settings
# ↓ --------------------------

title: Daily Feeds Blog

tagline: AI-Native Engineering 笔记 · 工程实践 · 软件架构

description: >-
  Max（Ma Wei）的技术博客，记录 AI-Native Engineering 的工程体系演化、
  AI agent 协作模式、以及围绕 Claude Code / GitHub / MCP 的实操笔记。

url: "https://maweis1981.github.io"

github:
  username: maweis1981

social:
  name: Max (Ma Wei)
  email:
  links:
    - https://github.com/maweis1981
    - https://ngmob.com

webmaster_verifications:
  google:
  bing:

# ↑ --------------------------

analytics:
  google:
    id:

pageviews:
  provider:

# theme_mode 留空 = 跟随系统；侧栏左下角可手动切换 light/dark
theme_mode:

cdn:

avatar:

social_preview_image:

toc: true

comments:
  provider:

assets:
  self_host:
    enabled:
    env:

# 暂时关闭 PWA，避免 service worker 缓存导致前端旧版本卡住
pwa:
  enabled: false
  cache:
    enabled: false

paginate: 10

# Project pages 子路径
baseurl: "/dailyfeeds-blog"

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
